body:
  text: 清浙水慈雲沙門灌頂續法集九佛身觀佛告阿難及韋提希至若他觀者名為邪觀初標境此句結前次句起後佛身即佛地論說生身非法身為物生成故形有高廣量故亦光明經謂應身非化身應正等覺故壽有始終數故此乃應生淨化土也法身清淨如虗空居法性土無始無終自報相好無邊量居自受用土中他報隨地見勝劣居他受用土中皆有始無終化身隨類變大小居通淨穢二變化土有始有終法界身普融無盡居無障礙法界土亦無始終故此遍觀三聖應真具足身相餘法報等並不談也其實祇此一應身上亦化亦報亦法亦法界但隨五教機宜所見成異經云吾今此身即是常身法身須如理思之阿難下二明觀二初直令中上根總以身心觀二先觀佛身三初別明身相七初身色夜摩天金超過日月而倍萬億輝艷叵思矣佛身下二形量那由他垓數此云萬億由旬此云限量大者八十里中者六十里下者四十里較二大士少二十萬億那由他而多恆河沙矣眉間下三眉毫須彌山廣八萬四千由旬三百三十六萬里遠其高亦爾白毫旋轉五倍於此佛眼下四紺目須彌東面一海濶八萬四千由旬合南西北共三十三萬六千由旬須彌山外七海環列一海如此餘六例然共二百三十五萬二千由旬會玄引百法鈔云娑竭羅海濶三億二萬二千由旬量彼一醎海尚爾況此四面七香海耶青白者山南海水同琉璃色青也山北海水同頗梨色白也身諸下五毛孔光如須彌者具衆寶色故彼佛下六圓光中先形量大千世界復有百億圓遍量大可知於圓下次化佛一下三化衆無量下七相好四一相一下二好一下三光皆八萬者轉塵勞成智德故一下四益佛念衆生如母憶子故相好中光明一一照攝念佛人也其光下次總判難思化佛相好光明離言說相真空觀也從於一心想中觀佛無量相好理事觀也由旬身眼廣狹自在八萬相好隱顯俱成周遍觀也此唯根熟大乘智眼知見非是初機凡小心力能及見此下三結顯觀益先顯益昔普廣問佛十方俱有佛土何以獨讚西方佛言閻浮提人心多雜亂令其專心一境乃得見佛往生念一佛功德與念無量佛功德無二即是念一佛中能見過去未來現在諸佛作是下次結觀以觀下次觀佛心先舉觀身全悲心應現故云觀身見心親愛歡念曰慈與樂德也憐愍惻怛曰悲拔苦德也各有三相一生緣慈緣一切衆生如父母六親二法緣慈緣一切諸法皆從因緣生三無緣慈不住法相及衆生相悲三例知佛心無形依性德顯故云大慈悲是運同體慈度諸衆生而亦不取衆生相亦不限劫數故云無緣慈攝衆生三昧經言諸佛心者大慈悲是慈悲所緣緣苦衆生若見衆生受苦惱時如箭入心欲拔其苦既諸佛以衆生為身心則如來外身內心衆生皆可隨順而觀矣觀心亦三謂如來藏心性本空寂離心緣相真空觀也具恆沙性德攝諸衆生無礙觀也一一德性遍滿法界無壞無雜含容觀也作此下二明益諸助語辭佛慈悲心即與真如平等無二遍一切處一切衆生不念彼此究竟寂滅衆生依於三昧觀之現前尚能見佛得忍況他世耶如勢至云我本因地以念佛心入無生忍是故下二轉為下鈍根從一相好入二初即一明多從一入者多則境繁心散難成三昧故眉間白毫者指前白毫宛轉五須彌相自然現者一光中現八萬相好二一毫相現一切相好皆現見無下二即此見彼益有二一見佛楞伽明諸佛有四平等謂字語身法故見一佛身即見諸佛身也二得記見佛聞法自得心開而受莂矣身上明現益心中明後益者交互言耳是為下三結成作是下四揀顯十觀音觀佛告阿難及韋提希至若他觀者名為邪觀先標境也見句結前次句生後觀聽十方圓妙明音自行號令彼十方苦惱衆生觀其音聲即得解脫利他號此下次明觀二初別顯十一身形初量較佛身短少恆河沙者例如東方淨光莊嚴界中淨華宿王智佛身長六百八十萬由旬妙音菩薩四萬二千由旬此土釋尊丈六人身八尺身紫下二色頂下二頂髻項下三光明中二先項光又三初形量十方面各十萬由旬量也其下二化佛皆如釋尊丈六金身具三十二相一下三侍者舉下次身光合修羅在人天中名五道開之名六道色相通二一五道身色二青等五色又正法念經云心如𦘕師𦘕出五彩黑即地獄癡情純厚黑黑業報故青即餓鬼多慳貪故赤即畜生多瞋害故人天白者多造白業報感善故修羅黃者居人畜間雖行施善好勝妬他故今於光中現者令知五道非他唯自一身心造弗以大悲光照不能離苦得樂也頂下四天冠三初明寶體其下二顯化佛觀音三昧經云昔已成佛號正法明今作菩薩為行淨業冠有佛者表帶果行因也高句三出形量觀下五面色眉下六眉毫二初根本光色流下二眷屬光相四先種數也一下次化佛一下三侍者變下四神變臂下七臂色有下八瓔珞初道數其下二現境莊嚴依正妙寶相也手下九掌指三先掌色手十下次指相四一畫一下二色一下三光其下四益敬愛不捨謂之柔軟以下三手用舉下十足相初舉足二先輪相自下次臺光下足下二下足其下二總例二初餘相同指八萬相好唯下二頂髻異肉髻相也無見項好也寶積經明應持菩薩用神力上觀三十二恆沙世界不能見佛頂故云無見頂此大小相極果所得示居因位故劣於佛以上總別相觀根境圓融無對所對真空觀也從真起應空不異色無礙觀也一一相好微妙含容周遍法界遍容觀也是為下三結成亦是應真身色非化相也佛下四揀顯三一顯利益禍現在災橫一也業障過去惡因二也罪未來苦報三也獲福遍周三際四也楞嚴云能令衆生持我名號與彼共持六十二恆河沙諸法王子二人福德正等無異悲華云衆生受苦稱我名聞我號為我天耳天眼所聞見不得免苦者不取正覺聞名福爾觀身可知若有下次明觀法八萬相好中為一耶為多耶衆內為總耶為別耶故此釋云十門中先肉髻不及佛表現行因當成佛果令知是心作佛義也次天冠立一佛表本成佛迹居補處令知是心是佛義也其餘如經次第作法界觀觀之作是下三揀邪正十一勢至觀次觀大勢至菩薩至常遊諸佛淨妙國土次句境也梵語摩訶那鉢此云大勢至思益云投足之處震動三千大千世界及魔宮殿故此下觀也於中二初舉所觀相三先別列五種五一身形長大八十萬億短小缺恆河沙例前觀音圓下二項光初形量十方共有一千二百五十由旬大也二照量十方共之亦有二千五百由旬遠也舉下三身光初光色有下二見益有緣見者揀無緣衆生雖近而不見也滅三障曰淨證三德曰妙是下三成名真實智光照理令一切證真方便慧光照事令一切斷惑故號無邊光也求上勢令他得佛十力化下勢令他永離三塗故號大勢至也此下四天冠初華蓮華也一下二臺一下三相佛正報土依報頂下五頂髻二先髻色鉢頭摩此云紅蓮花於下次瓶光佛事謂諸佛化度衆生事如八相等餘下次總例觀音指面臂眉毫掌指瓔珞也前則是心是觀音今則是心作勢至知佛菩薩皆唯心造矣此下後重明行坐二先行相中初地動也當下二華嚴也他方動處蓮花莊高如樂土者大本云風吹散花遍滿樂土隨色次第而不雜亂柔軟光澤馨香芬烈足履其上蹈下四寸隨舉足已還復如故華用已訖地輒開裂以次花沒清淨無遺隨其時節風吹散花如是六反此下次坐相三初地動從下二佛集金光佛者表金剛般若智能斷衆生諸煩惱故光明王者表二無礙智遍照法界拔苦與樂得自在故畟塞遍滿也此則釋迦三變淨土安置分身彼則畟塞其空多也可知坐下三法演宣說苦空深達實相名為妙法三輩九品未盡變易名為度苦統上本末身相以色性即智故色體無形說名智身真空觀也以智性即色故現色無齊說名法身理事觀也以色心不二故隨心能示菩薩身色無量莊嚴各各差別皆無分齊而不相妨非心識分別能知名法界身遍一切時處含容觀也作下二揀能觀心若得觀見始信是心作勢至矣我與菩薩寧有間耶是為下結也三聖皆云色身相者顯非法身以法身無有彼此色相迭相見故報化色相皆從法身之所現故起信云諸佛法身唯是第一義諦無有世諦境界除下益也初滅罪阿僧祇此云無央數作下二遊土菩薩具神足力觀則自然蓮花化生遊諸佛土楞嚴勢至云今於此界攝念佛人歸於淨土行者為觀不亦宜乎十二普想觀此觀成已名為具足至常來至此行人之所此下先明觀二初結前謂上二觀成時則於二大士身名為具足觀色相也見下二正示二先約入觀位以明觀想初後五一生方想謂於自心中當起觀想三聖來迎或持金剛臺或執紫金臺自身趺坐蓮花臺上生於樂界也作下二開合想合如托胎開如出胎上品蓮花為父母身化生矣問此與上中上下二品何別答此就心行因言彼約輩品果判又合如彈指頃到彼即開不待經宿誰謂其非上品上生耶蓮下三光照想照身法身頓爾成就也目開慧眼應時清明也見下四見佛想滿空中者即前所觀三聖具足色身相也水下五聞法想法界真如藏心真空第一義諦聞已即悟無生忍者名曰妙法三藏十二部一切修多羅蓋詮此也故云與合前明是心作佛是心是佛豈非演妙法乎與經合乎若下次就出定境以判功德淺深憶持謂聖相法音然此了了得見非前觀想可比故名此為真實知見是為下二成結三聖正報樂國依報與自身往見同時具想故名為普觀真如界內無佛無生絶相觀也緣起法中有凡有聖無礙觀也依正遍含自他攝入含容觀也無下三顯益佛法界身入一切衆生心想中是故心想佛成就時三聖化身常來至此所也十三雜想觀佛告阿難及韋提希至是為雜想觀名第十三觀先觀二初佛身二先丈六像又二初教觀丈六若有志心求生樂土者當於一處繩床西向跏趺端坐項脊相對不昂不傴調和氣息定住其心直想彌陀丈六金軀坐于花臺在水池上專繫眉間白毫一相猶如珂雪長一丈五尺外有八楞周圍五寸其毫中空右旋宛轉如琉璃筒從此發光瑩靜明徹顯映金顏堅久其觀白毫一見彌陀相好自然當現斯是釋尊別示初心從易觀佛入門之要術也如下二揀前具相指前第九觀也非是凡夫心力及者起信云一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色分齊不能盡知故二者依於業識謂諸菩薩從初發意至究竟地心所見者名為報身身有無量色色有無量相相有無量好所住依果亦有無量種種莊嚴隨所示現即無有邊不可窮盡離分齊相若離業識則無見相以諸佛法身無有彼此色相迭相見故諸佛如來唯是法身第一義諦離於施作釋曰論應身即化身亦名劣應身是今經丈六像也論報身即他受用身亦名勝應身是今經由旬身也唯識云隨菩薩所宜變為淨土或小或大或劣或勝前後改轉他受用身依之而住能依身量亦無定限故勝應佛非凡小心所能及也但想下三總顯觀福佛像丈六也具足由旬也阿彌下次大小化二一能化本或下二所化迹四一大化或下二小化約教判之八尺凡小見也丈六始教三乘見也恆沙由旬終教見也滿虗空中頓教見也是法界身神通如意於十方國變現自在圓教見也所下三形色圓下四蓮花佛花大小不定隨本身現起故觀下二二聖此亦明池水上及樹下者故云身相同生觀首相者頂上天冠中有一立化佛者觀音也頂上天冠中有一座寶瓶者勢至也助化一切者佛身既隨衆生心菩薩亦應所知量故是為下後結雜想者有二意根鈍觀佛菩薩勝相不成者令捨前大觀今丈六等像一也根利觀前勝相已就令其更觀大小化用使德位增進勝劣無殊二也九十十一偏觀三大像第八總觀三大像此則雜觀三聖大小像十二中加行人往生故前後觀境各不相濫若以法界觀之性空即是佛菩薩真空觀也隨心現起不定形理事觀也主伴同時遍無盡含容觀也十四上生觀三初標佛告阿難及韋提希一者令勝根上求下化中修萬行求生淨土下鈍信不可以少善根福德因緣得生彼國二者令知上輩善品內復有上中下三類不同故告之也二釋三初上品上生上品上生者若有衆生至是名上品上生者初句標境若下明觀二先因三初發心三心標何句徵一下釋專心上求於佛道名為至誠起信云一者直心正念真如法故堅久中修於萬行名為深心論云二者深心樂集一切諸善行故回向者回因向果也發願者願度自他也回願下利於我人名回向發願心論云三者大悲心欲一切衆生苦故具下結論云菩薩發是心故則得少分見於法身隨其願力能現八相利益衆生故云必生復下二根行三種標何句徵一下釋一中不殺是大小乘戒之根本求生樂土之首業深心開出二中博究大經解無量義誠心開出三中佛法僧天施戒名六念前四念他三寶諸天恩也後二念自行止二善德也此通誠深二心向願同前悲心生彼者願自他同生彼樂國也具下三日期功德指上心行二種再加專心念佛一七當命終時即得生也生彼下次果三初臨終報一聖境詳現楞嚴云若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生今樂土業成故終時現聖境也觀世下二執臺迎接三心六念勇猛精進故金剛臺以表之觀世下三讚歎勸進謂讚其已修因進其當證果也行者下二得生報生彼下三生後報三初聞法悟忍起信云若觀彌陀真如法身常勤修習畢竟得生住正定故經下二遍界受記還下三得大總持陀羅尼此云總持總一切善持無量行亦云遮持遮一切惡持無量戒亦可總持一切淨善法義遮持無量染惡法義也是名句結成二上品中生上品中生者不必受持讀誦至是名上品中生者先境也不下次觀二初因持誦方等上生修者善解一義當中生行起信云或有衆生廣聞經論而得解者或有衆生文多為煩少聞而取解者前則文義雙持次則唯義持矣第一義心者本如來藏法界心也唯識頌云此諸法勝義亦即是真如常如其性故即唯識實性信得是心是佛故不驚動了知十界因果皆唯心造名為深信絶不猶豫是心作佛之理故不誹謗兼顯上生中且能讚念三寶諸天也深信是信功德是行願生是願淨土三資糧備矣行此下二果三一臨終報紫金臺者起居注云金剛寶生於金中百鍊不銷尼乾經云帝釋金剛寶能滅阿修羅則金剛天上所寶重紫金人間為尊貴由解世間道中第一義性較前雖劣望後則勝故以此表之傳持淨業故讚法子直指人心是佛念必成佛名行大乘行者下二得生報十指齊對名為義手一合掌不義手二義手不合掌三掌亦合手亦義四不義手不合掌今是第三雙亦也佛以衆生為心令九界歸佛界故歎諸佛此紫下三生後報四一華開光照經宿開者揀上生中隨到隨開也紫金色者彌陀佛身夜摩天閻浮檀金色觀音面雖閻浮檀金而身是紫金色則行者同菩薩身矣光照目開者行人與佛氣分交接即凡夫身眼成佛身眼也因前下二聞法讚佛衆聲指水光林鳥非佛願行寧充法喜故讚歎經下三進覺修定不退進覺也起信云若人專念阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退小本云衆生生者皆是阿跋致法藏願云我作佛時聞我名號歸依精進於諸佛法永不退轉阿耨至菩提此翻無上正等正覺菩提覺揀三途不覺攝人天乘果三正揀凡外不正攝聲聞辟支乘果三藐正等揀二乘定性不等攝始終頓圓菩薩乘果阿耨多羅無上揀大乘等覺已還菩薩有上攝妙覺一佛乘果此於二佛果中屬智果轉煩惱而成者應時下修定也楞嚴等百千三昧無不歷具故云修諸經下四得忍受記諸佛現前與受果記名現前記也是名句後結也三上品下生上品下生者亦信因果至是名上品下生者初標境亦下二明觀二先因即心即佛故信而不謗即佛即心故發無上心願與法界衆生同生西方成等正覺名之曰道對前上中缺於持經解義二種功德發心念佛持戒行施等行者下次果三初終報但發真正菩提道心故以金蓮為表然不能持經解義安了達實相果理豈如前之花中有臺也眼等五根不緣五塵破滅五百煩惱信等五根出生五力成證五百佛法故五百佛為表然不能得六根中千二百功德如來藏中恆沙性德豈如前之千佛無數佛耶化佛讚發心者由依四諦境發四弘誓願此菩提願即佛心故見此下二生報一日下三後報二初花開見佛上則到時即見中則經宿乃見此則七日中見至三七後見之究竟者蓋心願雖發未能稱真修八萬行轉塵勞成相好故聞衆下二聞法得果供佛聞法者生前不能廣修福慧故於極樂遊後歷事諸佛滿足三嚴也百法明門者大乘家五位百法也名數如百法論總顯三界所有唯識所現歡喜初地名初得超凡夫地入菩薩位離世間趣入出世道如來種中決定當得成多欣慶故名歡喜華嚴明初地菩薩於一念頃得百三昧見百如來百神力動百界照教百剎衆生住壽百劫知前後際各百劫事入百法門現百身示百菩薩住此地位安有不喜者耶是句三結成三結是名上輩生想名第十四觀發大道心具二利行故名上輩復開三者勝劣殊故相對揀顯之上上品則七日七夜讚想於佛三心六念讀經解義深信因果持戒利生發大心願回向求生因勝也真佛與無數化佛來迎乘金剛臺到即花開見佛聞法悟無生忍受諸佛記得陀羅尼果勝也上中品則五日五夜一心想佛不謗三寶解第一義深信因果持戒弘法發菩提願回向求生因中也真佛與一千化佛來迎乘紫金臺經宿花開見佛聞法七日後菩提不退一小劫得忍受記果中也上下品則七日或但五夜專意想佛不謗法信因果持戒益物發心發願回向求生因劣也真佛與五百化佛來迎坐金蓮花一日一夜花開七日見佛三七聞法三小劫住初地果劣也因果品位雖有勝劣望後中下皆名上輩大本上輩往生文云若發無上道心深信因果不謗三寶捨家棄欲行沙門法大修利益衆生功德專念彌陀願生彼國真佛與諸聖衆來迎坐七寶蓮住不退轉智慧勇猛神通自在故此與彼義相同也亦即前三福中第三淨業想者無相寂滅心中本無上輩三品真空觀也不妨依無相心造出上生行相雖成諸有為相一一入無生性無礙觀也有為無為相即自在上品下品主伴圓明周遍觀也深思之令現前心佛衆生盡歸法界性矣十五中生觀三初標佛告阿難及韋提希告亦二意一令中人已上者見賢勵己捨中以取上也又令中人已下者改惡遷善欣中以厭下也二使了中輩不善不惡類內又有上中下三品之不同二釋三初中品上生中品上生者若有衆生至是名中品上生者先境若下次觀中初因五戒者不殺盜淫妄言飲酒也八戒如前諸戒即十戒二百五十戒三學之首四諦中道也無衆過者一切惡不作故四諦中集諦斷也善根指修道滅集言臨命下二果三初終報與比丘者持聲聞戒故金色光者堅修不犯故說苦空者常觀苦諦故謂觀身不淨受苦空心無常法無我也出家離苦者出見煩惱家離分別惑苦初果也出思煩惱家離俱生惑苦四果也又出三界火宅家離分段生死苦二乘果也行者下二生報蓮花臺者梵語毗尼此翻為滅得滅果故或名尸羅此云清涼離熱惱因得清涼果故亦名波羅提木義翻為隨順解脫隨順有為即有餘涅槃無為即無餘涅槃二種解脫果故今則終身持具足戒成五分法身得涅槃解脫經云戒淨有智慧便得第一道故華中有臺也蓮華下三後報四諦者苦以業果逼迫為義二種生死等集以增長無明為事五住煩惱等道以除患為功正助道品等滅以纍盡為名二種涅槃等阿羅漢有三義一應供應受人天供養乞士果也二殺賊殺盡諸煩惱賊破惡果也三無生永無三界生緣怖魔果也三明者過去宿命明現在漏盡明未來天眼明也六通者天眼天耳他心宿命神境漏盡悉皆無壅故也問通明何別答智論云直知過去等名通委悉過去等因緣行業名明婆沙云天耳但是聞聲他心緣他別想神境即神足通亦即身如意通此但工巧而已故但名通宿命知過去苦生厭天眼知未來苦令離漏盡現觀惑智斷證由此三兼稱為明也八解脫者一內有色外觀色解脫位在初禪能脫自地及下欲界二內無色外觀色解脫位在二禪二禪內淨故三淨勝解身作證解脫位在三禪定中鍊八色光地水火風青黃赤白極令明淨與樂俱生故此三於微妙五欲無染著也四空處解脫滅根本四禪及前三解脫等色入空處定具足而住五識處解脫捨空緣識入定六無所有處解脫捨識緣無所有定七非非想處解脫捨無有入非想定從空處來並修八聖種觀如癰瘡無常等一一定中背捨不著此四位在四空於下地法得捨離也八滅盡解脫滅受想諸心數法以寂滅涅槃安著身中此一位過三界能脫一切有緣心慮也亦名為八背捨背彼淨潔五欲捨離此著心也背捨據因解脫約果說問往生論二乘不生此文明小種得生成羅漢果如何分別答有四意一小乘不信有他方佛色者不生信者生矣隨其善根證三四果經云修行諸戒回向願求二定性趣寂者不生不定性或臨終回心大者得生是故到彼先成小果後成佛果則彼土聲聞皆以佛道聲令一切聞者也三實行聲聞不生退菩提心二乘則生無漏道熟一聞苦空四諦法音便成羅漢不須經久得大菩提四經顯始終教中大心聲聞引攝實行入於佛種也論揀小教中愚法二乘欲令定性背小向大也是名下後結次中品中生中品中生者至是名中品中生者中句標境若下明觀先因沙彌此翻息慈息惡行慈也戒有十即前八戒後更加九不過中食十不捉金銀生像也具足戒即比丘戒及比丘尼戒也威儀三千威儀也一日一夜揀前終身持也戒香五分法身香之首也如此下二果初終報七寶蓮者月擇幾日寶持齊戒非盡生故見佛彌陀色身也聞聲彌陀智身也迦葉佛云一切惡不作能奉行諸善自淨其志意是則諸佛教故讚言善人諸佛教者戒經云過現諸世尊能勝一切憂皆共尊敬戒此是諸佛法今能受持無犯豈不隨順行者下二生報在下三後報聞法指四諦須陀洹此云預流預入聖人流也或云逆流逆彼六塵流也初果名斷八十八使離凡夫無量生死之苦羅漢四果名斷八十一品離聖人七返生死之苦是名句結成後中品下生中品下生者若有善男子至是名中品下生者先標若下次釋二初因先生時修世間善孝養三綱中一仁慈五常之首三綱立人倫之道盡矣五常即五戒仁則不殺義則不盜禮則不淫信則不妄言智則不飲酒五常行佛教之戒傳矣此二三種淨業內第一福德也此下次臨終值出世法佛土增其外緣令顯緣因佛性也說願發其內因令顯正因佛性也起信云因緣具足者所謂自有熏習之力又為佛菩薩等慈悲願護能起厭苦之心信有涅槃修習善根乃能進趣問云何不說回向願求答既聞稱性四十八願唯心佛土樂事信向願往可知聞下二果二初生報聞者聞慧了因佛性開顯也此事指正緣二性三因性顯一佛乘彰近則生方證小遠則成佛利生經下二後報法謂苦空無常等問孝養仁慈為世出世之善基大小乘之法本況聞佛願何但成小答厭苦心切故速求無漏故願先度自故佛順本習故法隨機解故從小漸大故是名句後結三結是名中輩生想名第十五觀回向願生成自利行故名中輩亦分三者高卑亦別故若對顯之中上品則三日三夜想念於佛長持諸戒無惡逆過發信願心回向求生者因高也真佛與比丘眷屬來迎乘蓮花臺即生彼土蓮花尋開聞四諦法得羅漢道果高也中中品則一日一夜觀想彌陀及持八戒十戒或具足戒發回向心願生西方者因中也真佛來迎坐七寶蓮經七日開得須陀洹至半劫後成羅漢果果中也中下品則一日或一夜孝養仁慈臨終得遇知識指示佛土願者因𢍉也命終即乘蓮花往生經七日已遇觀音勢至聞法得初果過一小劫成阿羅漢果𢍉也因果品位雖有高卑望彼上下皆名中輩大本中輩往生文云若不作沙門行但發菩提心深信因果不謗正法為自業苦專念於佛多少修善造像持戒飯僧然燈回向願生化佛與大衆來迎坐蓮花中往生其國住不退轉功德智慧故此與彼義旨無殊亦即前三福內第二淨業也想者中輩三品行相當體寂滅真空絶相觀也理實三類中生並唯自心顯現事理觀也人法交涉依正相在含容觀也若常觀此中生法界時時往彼樂土見佛十六下生觀三初標佛告阿難及韋提希說中生竟又標告語者一令上智善根當堅心念佛見不賢而內自省決定往生又令愚鈍惡逆亦回心念佛聞彌陀十念之願帶業可往二審下輩惡品內更有上中下不同又此對後二之別亦是總告也問小本云衆生生者皆是阿跋致其中多有一生補處五逆十惡云何得生答彼約果言故唯善人此約因論故通惡逆蓋由佛性是同故不壞信種故稱名滅業故願生樂土故彌陀願力故圓實教中並許無性闡提悉當成佛亦此意也二釋三初下品上生下品上生者至是名下品上生者下句標境或下明觀中一因又二先生時作惡惡業殺盜淫妄等惡法刀劍穿窬等楞嚴明二類一約輕重文云純情即沉阿鼻地獄若沉心中毀佛禁戒誑妄說法虗貪信施五逆十重更生十方阿鼻地獄釋曰純情十惡習也今下品上生毀戒誑說今下品中生逆重今下品下生二約根境文云若諸衆生惡業同造入阿鼻獄六根各造及彼所作兼境兼根是人則入八無間獄身口意三作殺盜淫是人則入十八地獄釋曰同造六根十習同時具造也今下品下生各造根習雖具而不同時也兼者雖同時兼作但缺而不具也今下品中生後則三根三境今下品上生托華鈔明善不善三品各通三法一約境惡則於勝殺為上謂父母等於劣殺為下謂蚊蚋等餘者為中善則於劣不殺為上謂蚊蚋等於勝不殺為下謂父母等餘為中二約心無問善不善但猛利心作為上泛爾心作為下餘者為中三約時若善不善但三時無悔者為上作已方悔為中正作能悔為下三時欲作正作作已也今下品上生不善於心境時內皆屬下品命下二臨終修善二先聞法除罪知識僧寶也大乘華嚴梵網法華涅槃等十二部經題者一修多羅此云契經長行直說法相者二祇夜此云應頌重頌長行所說者三和伽那此云授記聖言說與名授果為心期名記四伽陀此云諷頌孤起別諷不重頌者五優陀那此云無問自說不待請而說者六尼陀那此云因緣有人問故為說是事者七阿波陀那此云譬喻如舉扇喻月動樹訓風等八伊帝目多伽此云本事說佛本昔曾為利生淨土事也九闍陀伽此云本生是說菩薩本昔受生諸因緣也十毗佛略此云方廣體相正直為方德用周遍為廣十一阿浮達摩此云未曾有如來現諸神力衆生怪未曾有十二優婆提舍此云論義逐釋所以答其問者除千劫者法寶名德不思議故智者下次稱名除罪如來萬德洪名威力廣大利益無窮故此於善三法中境屬上品心時亦屬上也爾下二果先終報但聞佛法之名不觀佛法之身故遣化三聖來迎作下次生報經下三後報甚深經者是大乘法非小乘也發心行也初地證也是名下結成二下品中生佛告阿難及韋提希至是名下品中生者初境毀佛禁戒盜三寶物較前更重猶許生方恐人難信故又重別以告之或下二觀先因二初生時作惡有二一毀諸戒如此下二造十惡僧祇物此云十方衆僧物謂厨庫華果等物係招提常住供養過未十方衆僧者也現前僧物者謂衣食藥具唯施現前十方僧也偷盜身三中一不為弘法利生但求名聞利養名不淨說攝口四也慚愧羞恥也屏處造罪不慚於天自亦不羞不重賢善皆名為無慚顯露為非不愧於人他亦不懼不拒暴惡皆名為無愧攝意三也日積月纍名為莊嚴因也此於不善心境時內皆屬中品地獄果也命下二臨終修善先罪報現前楞嚴云一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交純想即飛必生天上純情即沉墮阿鼻獄成論明極善極惡俱不經中陰今則八熱獄相現前下墜無間必矣遇下次佛力消滅十力者一是處非處力知一切因緣果報是生處非生處二業智力知衆生過現未來諸業受也三定力知諸禪三昧四根力知衆生諸根上下五欲力知種種欲樂六性力知世間無數種性七至處道力知一切道至處相八宿命力知百千世中身命苦樂壽年長短等九天眼力見衆生生時死時善道惡道端正相醜陋相等十漏盡力能知自他諸漏盡者即已盡我生不受後有也此十佛悉遍知無能壞無能勝故稱為力威即四無所畏德即四無量心四無礙辨等神力者十神通也無作戒為戒身無漏淨禪為定身無漏智為慧身有為無為二種解脫為解脫身盡智無生智知諸解脫相為解脫知見身前三約因道諦修成後二約果滅諦證得於前三善法中心時屬上境則居中也除八十億劫罪者問上生稱名聞法而滅罪少此中但聞佛德而滅罪多者何也答上則業報猶輕除少可生此則業報稍重須多除得往理實佛法隨心應量非情可計度故猛火化凉風者業障煩惱如火炎熱佛法清凉如甘露故地獄吹天華者變無間苦報為天華樂境故華下二果先終報如下次生報經下三後報大乘甚深典者談一切衆生皆有佛性有佛性者皆得作佛之義也是下三結三下品下生佛告阿難及韋提希至是名下品下生者先標境不揀逆重十念可往此又甚為希有難信故復告以勸曉也或下次明觀初因二先生時作惡初惡因不善業者身口意三諸惡業也五逆者一殺父二殺母三出佛身血四殺阿羅漢十地聖人五破羯磨轉法輪僧外加六殺和尚七殺阿闍黎即名七遮十惡者謂十重惡殺盜淫妄酒說四衆過自讚毀他慳惜加毀瞋不受悔誹謗三寶也諸不善者謂四十八輕及餘具足戒十戒八戒也此於不善心境時內皆屬上品如此下二惡報惡道獄鬼畜也多劫約罪時無窮約苦果問大本明五逆謗法不生此經逆重得生何也答釋開五義一大本除五逆兼謗法不生此經說五逆不謗法得生良由謗則不信不信自不往也二大本揀謗淨土法門不生此經明謗餘佛法而信有安樂願生彼國肯十念者得生所謂疑則花不開信則決定往也三大本謂下根造逆多無重悔罪不能懺不生俱舍云愚作罪小亦墮惡道智犯罪大亦能脫苦如團鐵小亦沉於水為鉢鐵大亦能浮飄此經謂上根造逆必有重悔令罪消滅得生涅槃云闡提有二一利根於現在得善根二中根於後世得善根如闍王作逆慚愧重悔佛為說法得無根信是也四大本為生前無苦不一心念是散善力微不能滅逆不生此經為臨終苦逼十念觀佛是定善力強能除重逆得生五大本去一生逆謗終亦無悔毫無一念佛法之善不生此經取先修善後惡逆或先惡逆後修善臨終遇善友勸信有西方能十稱者得生有此五意故兩經開遮不同如此下次臨終修善先苦逼不遑念佛善知識者誠中形外曰善聞名欽德曰知覩相奉教曰識又真正為善面會為知心交為識安慰等者安以求生樂土之妙法慈也慰以念佛離苦之教門悲也苦逼地獄惡相現前也不遑心中惶怖難觀也善友下二至心稱名滅罪觀想曰念持名曰稱純一無間曰至心相續成片故不絶一者數之始十者數之終圓滿善心故具十南無翻歸命或信從亦云度我佛德無量一名攝盡故稱時即罪除於前三善法內心時屬上境則居下也問云何十念便能滅八十億劫罪耶答具三力故一本有佛性力如火如舟船二至心稱名力如鑽如帆楫此二自力猛利也三佛願攝取力如人如順風此一他力強勝既因利緣強境勝心猛故能燒罪木而到蓮池也法藏十八願云乃至十念若不生者不取正覺又大本云乃至一念至心回向願生彼國即得往生大品云若有一人稱南無佛乃至畢苦其福不盡佛名經云一聞佛名滅無量劫生死之罪此如百輛車薪星火能燒萬年室暗盞燈能破一錐千紙一風億土故調達獄中一稱佛時變衆苦為三禪樂張善和臨終未滿十聲惡相滅而佛來迎鍾馗設佛像而除羣雞面之苦雄俊信念佛而成地獄漏網之人一稱三稱尚爾況十念多念者耶命終下二果初終報上生念佛法寶名德故見寶蓮中生聞佛威德自在故見天華下生十稱念念不改故見金蓮日輪者因則始終至心稱念報則佛日慧光注照前後不輟矣如下二生報於下三後報上生滅癡暗惑障故放大智慧光明中生滅黑染業障故流清白梵行音聲下生滅罪苦報障故宣救苦大悲音聲實相滅罪法者普賢觀云一切諸惡業皆從妄想生端坐念實相衆罪如霜露慧日能消除若達妄想非有罪性本空業相轉為實相又何苦報之有是句末結成三結是名下輩生想名第十六觀始惡終善缺二利行故名下輩亦有三者惡固久多而善雖短少亦有強弱之不等故若對揀之下上品則半日或半夜聞經題稱佛號雖造十惡然不謗法信西方願往生者因強也化佛來迎坐寶蓮華經七七日花開聞法發菩提心過十小劫登歡喜地果強也下中品則一時一刻聞佛相好法身威德雖破諸佛戒偷僧祗物然亦不謗法願生西方者因中也化佛來引坐天華中經六劫蓮始開聞法發心果中也下下品則十念一念彌陀名號雖造五逆十重然不謗淨土法門生重悔求安養者因弱也命終見金蓮花住在面前引生樂界十二劫蓮方開聞實相發道心果弱也因果品位雖有強弱望前上中皆名下輩大本下輩往生文云若不能作諸功德但發菩提心信因果不謗法不造逆惡專意十念乃至一念念阿彌陀歡信不疑願生其國臨命終時夢見彼佛亦得往生功德智慧故彼此義相類亦即前三福內第一淨業也問此經前六品明善後三品明惡大本三輩純善無惡云何下輩與下三品齊耶答十念行是相同故輩配品正相合故能重悔惡改善故捨下輩無所攝故想者下品法界性中本無罪性真空觀也罪性雖空善亦不忘理事觀也有性無性齊成佛道於塵方地獄天宮皆為淨土於沙界周遍觀也事事作此三法界觀何患乎法界土佛不見四聽衆獲益說是語時韋提希至無量諸天發無上道心先見佛生喜從初至此四番觀見始於金臺中現十於國土令見極樂世界嚴顯可觀次則聲光中令觀彼佛彼國淨業成就三於總觀樂土後別觀聖身前空中現三聖像證明令起想念四則於此十六觀末重見彼土淨妙聖相端嚴前三佛力加被見今一自力觀想見欲見即見名曰應時廣長即縱廣直長曰縱內之入深量也橫寬曰廣外之開闊量也見始如意故喜向不能得故歎豁下次悟忍發心三初夫人悟忍解知是佛是心是心是佛故稱豁然大悟證見是心作佛作佛是心故得逮無生忍又一悟一切悟名大豁悟經云理則頓悟乘悟併銷一切忍一忍名無生忍經云初地為八有何階次前佛示云觀見彼土心歡喜故應時即得無生法忍今徵夫人信不誣矣五下二侍女得記信解佛法界身不離衆生心想故發心華座蓮並是法藏願力故願生菩提心發當得菩提往生願立決定往生故悉與記也諸佛現前者見無量壽佛時即見十方無量諸佛現前授記亦名此為念佛三昧作是觀者名為遍觀一切佛身觀此即發心所感之果也無量下三諸天發心發心有三一智心離五濁惡世證入法性天故二願心度惑業苦海超登淨義天故三悲心救娑婆衆生往生極樂天故又依自本覺佛性發起信行願為淨土資糧亦名為無上道心也問論謂女人根缺不生此明夫人侍女皆悉往生何意也答一經據此土是女流論據彼國是丈夫二經約因帶業許不男論約果離欲無有女三經就現身根缺得生論就後身根悉具足四經依初往是垢穢女身論依轉報是清淨六根法藏三十五願云其有女人聞我名字歡喜信樂壽終之後復為女像者不取正覺又涅槃經說女人信有佛性即是丈夫男子不信有佛性即為女輩況今夫人侍女親見佛法身耶故大本彌陀願中上至天人下及地獄餓鬼畜生蜎飛蠢動皆得往生經又云衆生生者皆住正定以彼國中無諸邪聚及不定故宜善思之四總結二種經名令得果證分爾時阿難即從座起至即是持無量壽佛名先問法空為座有所咨詢不應坐故敘禮也白下陳問也當句問經名三淨業十六觀以何為總目也此下問持法法有三謂心佛生此是佛法而兼心法衆生法也要謂總綱宗歸執受在懷曰受思慧亦即願義守持於身曰持修慧亦即行義顯前攝耳諦聽屬聞慧信義也云何者福業固為三世諸佛正因之法云何於三者中持其宗歸為滅罪生方見佛祕要之術妙觀固為如來奇異方便之法云何於十六中受其總綱為悟忍得記成佛要妙之道也佛下次答二先答二問令修證二初答問名名有二初名依理行立觀行也表法界智及無礙權實三種智樂土三聖理也表無盡法界及中道俗真三諦理如次配知亦下次名依教果立淨業障教也初福教修人天善事也除報障次福教持二乘戒理也淨業障後福教發大乘心事理雙通也淨除煩惱障今舉中以攝前後耳生佛前果也前云欲生彼者當修三福修淨業者得生西方此則初名依十六觀次名依三淨業亦可二名並準觀立初名別準六九十十一四觀次名總準十六觀也汝下二答問持亦有二初名十六觀中則六九十十一四觀門為觀想之要道當受之無令忘次名三福業中第三第二福業為淨業之要術當持之無令失亦可第六觀除億劫極重惡業第九觀生諸佛前得忍授記第十觀淨除業障第十一觀除無數劫阿僧祗生死之罪當專持此法要可也行下次顯二益勸成果二初觀觀佛益勸念得成佛三先直明三昧者觀佛想像皆名念佛三昧也現見者由觀三聖真實色相身故若下二況顯大本明聞名有五益一悟法忍二具梵行三人天敬四得往生五成佛道則此滅罪猶略顯耳若下三結勸數數記持謂之憶正屬持名事也常常繫緣謂之念正屬觀想觀像兼事理也亦通實相理也念佛開四益一成芳名分陀利有二釋一睿師云未敷名屈摩羅將落名迦摩羅中盛名分陀利當知吾人身中各具覺悟之蓮華念佛心開了明佛性悟佛知見如蓮花正泛也二祥邁注云分陀利此云白蓮花白色為衆色之本佛乘為餘乘之宗涅槃云水生花中分陀利最為第一今念實相佛是一乘真宗中道了義猶如白蓮花也人中以此立其名者為其處染常淨方因即果住佛真理為物軌範故也二得勝友佛菩薩身從心想生常觀三聖自有不退補處為伴侶矣三坐道場信得是心作佛緣想諸佛相好正遍知海當來畢竟坐於菩提樹下金剛臺上而得如來道果也四生佛家覺知是心是佛圓發三心遍修六念紹隆諸佛家業安有不入佛種親為佛子耶約教釋之一緣想境界念佛人中下下品蓮花信不退菩薩友坐發心菩提道場生變化非受用佛家小乘教相也二攝境唯心念佛為人中下品蓮花住不退菩薩友坐伏心菩提道場生亦變化亦受用佛家大乘始教相也三心境無礙念佛人中中品蓮花證不退菩薩友坐明心菩提道場生受用非變化佛家終教相也四心境俱泯念佛為人中上品蓮花行不退菩薩友坐出到菩提道場生非變化非受用佛家頓教相也五重重無盡念佛人中上上品蓮花煩惱無動位不退菩薩友坐無上菩提道場生圓通無障礙佛家圓教相也應如理思知念既多益何待勸為佛告下次顯淨業益勸持得見佛巧妙謂之好淨念相繼事上好也圓觀無間理上好也教修三福曰語法也佛名佛也名因德建持則滅罪見佛語能詮義持則淨業生方故得佛法相即況法是佛母佛從法生法為佛師佛依法住故持法即持佛利益等無別也總前四分此經所宗故名為正宗分三流通分二先王宮流通佛說此語時尊者目犍連至聞佛所說皆大歡喜佛能說人釋迦尊也語所說法自分經也目連等所得果目連阿難增道損生夫人侍女得忍受記梵釋四王發心願往聞聞慧信也信而始聞故歡思慧願也意思歡悅其所願故喜修慧行也身口慶喜此修行故並超權小稱之為大此三寧非尊者夫人所得果乎三種清淨人法果三慧圓發聞思修三資糧具信願行經之弘通也可知次靈山流通爾時世尊足步虗空至聞佛所說皆大歡喜

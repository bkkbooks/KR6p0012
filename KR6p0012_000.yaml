front:
  text: 觀經直指疏序非佛作心不厭娑婆而造十惡非心作佛不欣極樂而行十善者凡夫也佛外有心知苦集而觀察三界如牢心外有佛慕滅道而不信他方剎土者二乘也是佛作心度衆生而不住涅槃是心作佛修萬行而不住生死者菩薩也即佛即心導三乘而入一乘即心即佛攝九界而歸佛界者如來也所以無量佛出淨土而來穢土改濁還清二大士引惡人而到善人革凡成聖國王現逆順之境有感有應世尊示折攝之門為避為趨是心作佛之教於是乎興是心是佛之理於是乎顯矣蓋教能詮行理由觀彰行開三種觀分十六行行稱真如之性觀觀宗法界之心日落懸鼓於西方水起琉璃於樂土樹蓋現十方之塵剎池水演三寶之玄音地內映寶珠之色界上總樓閣之觀華座本是願力所成聖像不離心想而變欲覩全體之金容先瞻眉毫之玉相觀音上頂於佛果勢至下動於含靈然後普觀自身之能生雜想三聖之所現金剛臺上之以上寶蓮花中而又中化佛流光下品得往總之境不離心事依理顯觀心妙也時時住唯心之安養究理盡也念念見理具之阿彌由此國太夫人悟即心是佛忍證無生諸天侍女了作佛是心記發無上真所謂火內之蓮花海中之舟楫病客之良醫飢民之美膳未有甚於此經者也故得阿難受持於王宮耶舍傳譯於宋世天台智者解説於隋朝清涼國師備釋於唐代詎知言近而旨遠者宜若登天之不及文簡而義周者奈何墜地以無聞因之一心投佛三復斯文遵賢首之宗承秉帝心之觀道集成略疏名為直指若曰智辨無礙有慚往哲法門增廣無愧今心將使諸佛心內之衆生在在觀即心之諸佛衆生心內之諸佛常常迎作佛之衆生生佛與心同歸法界是則此疏之作寧不為西方之直指也歟欲往彼國而慮乎蹊徑者請沉玩於斯焉時康熙癸亥年閏六月初八上弦日灌頂行者續法題於慈雲觀堂

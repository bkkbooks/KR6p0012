body:
  text: 清浙水慈雲沙門灌頂續法集歸命釋尊諸聖賢西方無量佛菩薩願承三寶大慈悲冥被疏之與經合傳流無盡法界中見聞說者皆開豁回茲勝德利羣生同證菩提安養樂疏此經義文分為二先略標章門將釋此經十門分別一教起因緣二藏乘分攝三辨定時會四教義分齊五所被機宜六能詮體性七宗趣通局八翻譯傳授九總釋經題十別解文義後詳釋義相十初教起因緣初教起因緣者華嚴云非以一緣一事而得成就如來出現今說觀經亦多因緣一為揀娑婆苦多惡逆人當厭捨故二為顯安養樂聚佛菩薩應欣取故三為宣揚三種淨業前後有勝劣故四為開示十六觀門事理有淺深故五為的明是心作佛成念佛三昧故六為直指是心是佛悟身中佛性故七為令信稱佛名但十念頓饒益故八為令知帶惑業亦往生漸斷證故九為度七趣男女皆可到彼淨土故十為引三乘權小盡得歸於佛界故由茲十義說此經也二藏乘分攝二藏乘分攝者藏有二一三藏經律論也此經明觀經藏所攝二二藏聲聞菩薩也此觀三聖菩薩藏攝乘有四一小乘聲聞四諦法也如羊車二中乘辟支因緣法也如鹿車三大乘菩薩六度法也如水牛車四一佛乘諸佛菩提涅槃法也如白牛車今教念佛疾成佛道一乘所攝分謂十二分教一契經二應頌三授記四諷頌五因緣六自說七本事八本生九方廣十未曾有十一譬喻十二論議今此經者契經授記因緣方廣未有譬喻六分所攝何者以是長行直說侍女悉記因請方施廣陳觀法臺光現界冰類瑠璃故也三辨定時會三辨定時會者時有三一日出先照時為圓頓大根眾生轉無上根本法輪所謂初善日初分時入也二日昇轉照時為下中上三類眾生轉依本起末法輪所謂中善日中分時入也此一時內轉開三照初轉照時為下根轉小乘法輪中轉照時為中根轉大乘法輪後轉照時為上根轉一乘法輪三日沒還照時為上上根眾生轉攝末歸本法輪所謂後善日後分時入也此當中轉時說談念佛門引攝凡小入大乘故會有五一華嚴會直顯教也二阿含會隱實教也三深密會引攝教也四妙智會融通教也五法華會開會教也此當深密會攝以方廣大教剎海之談諸佛菩薩甚深行願皆是引攝教會諸法相故應如法思之四教義分齊四教義分齊者開二先約教詮法通局顯分齊教相有五初小乘教但說我空不顯法空故二大乘始教但說法空未能盡理故亦名分教但說法相有不成佛故三終教明如來藏方盡極說故亦名實教悉當成佛稱真實理故四頓教唯辨真性不談法相故五圓教法界性海緣起無盡故今此經者屬後三教是心作佛終也是心是佛頓也佛法界身入一切眾生心想中圓也次約法生起本末顯分齊法義亦五初唯一心為本源所言法者謂眾生心是心則攝一切世間出世間法即華嚴一真法界無障礙心圓教也二依一心開二門一者心真如門所謂心性不生不滅頓教分齊也始教中空義亦是密說此門以空宗人不知如來遣相處以為顯真性故非彼分二者心生滅門依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿梨耶識終教分齊也分教中識義亦是密說此門以相宗人不知佛說如來藏以為阿賴耶故非彼分三依後生滅門明二義一者覺義謂心體離念等虗空界二者不覺義謂不如實知真如法一故破相宗齊此覺義以為清淨本然之地以彼宗未明真空相即真如心性故說諸法無不是空縱有一法勝涅槃者我亦說為如幻如夢凡所有相皆是虗妄離念相者即是法身依此法身說名為覺故空宗詮法唯齊覺義四依後不覺義生三細一者業相二者轉相三者現相唯識宗齊此業相以為諸法生起之本以彼宗未明此三細等與真如同以一心為源故說真如無知無覺凝然不變不許隨緣但說八識生滅縱轉成四智亦唯是有為不得即理故相宗詮法唯齊業識五依後現相生六麤一者智相法執俱生也二者相續相法執分別也三者執取相我執俱生也四者計名字相我執分別也上四皆惑道五者起業相業道也六者業繫苦相苦道也小乘教唯齊第三但斷我執未證法空故人天乘唯齊第五但知善惡業相不識二執惑故下文明法界無盡身佛圓演三心六念百千陀羅尼法即一心總相法也徧滿虗空中大身佛純說甚深第一義諦即真如也無量無邊高出一切世界上身佛具說大乘實相因果即生滅也高六十萬億那由他真實身佛說大乘般若發無上道心即覺不覺義也高恒河沙由旬具足身佛說百法明門住歡喜等十地即三細義也丈六身佛說四諦門具足戒法即齊執名義也八尺身佛讚歸戒孝養仁慈善法即齊業苦義也此經通詮本末義理深廣明矣五所被機宜五所被機宜者料揀有二一具三慧佛地論云菩薩履三妙慧得於淨土往還一者聞佛法歷於耳根識也二者思觀道想於心意內也三者修淨業行於身口外也下文夫人請云願遣為說令我見聞教我思惟教我正受如來誡曰汝當諦聽善思念之一心受持諦觀彼佛後況顯說但聞佛名除無量罪何況憶念若無三慧即非器矣華嚴云寧在諸惡趣恒得聞佛名不欲生善道暫時不聞佛二貲三糧一者信信有淨土心不疑貳也二者願願求往生心常樂欲也三者行行念佛法心無間斷也下云深信因果不謗大乘善根迴向發願往生修行六念具諸戒行是知信則地獄蒙光脫苦往生不信雖二乘不生如五百聲聞不見舍那神力願則餓鬼畜生等來生我剎中不願雖積行菩薩難往出現品云菩薩於無量劫行六波羅蜜若此不思議大威德法門不順不入不得名為真實菩薩以不能生如來家故行則五逆邪定亦能滅罪見佛不行雖禪戒人天亦被移他土又有願行而無信則從胎生處於疑城有信行而無願如悠悠念佛臨終不得往生有信願而無行如眾多障礙牽纏不念佛者故具二缺一具一缺二皆非機也華嚴云雖住海水劫火中堪受此法必得聞其有生疑不信者永不得聞如是義若總收者無論聞與不聞信與不信或順或違或讚或毀皆為所被毀如罵常不輕違如十仙外道不信者大本云疑城眾生識其本罪深自悔責得離彼處往詣佛所不聞者大本云無量壽光照三途時解脫眾苦即得往生故知成法破法皆名涅槃有性無性齊成佛道圓覺云一切眾生皆證圓覺涅槃云有佛性者皆得成佛此之謂也六能詮體性六能詮體性者略開四門一隨相門又三初聲名句文體此之四法皆屬能詮體用假實二相貲故下云讀誦大乘方等經典二通攝所詮體若不詮義文非教故下云善解義趣三六塵顯法體光臺樹網同演妙音故下云水流光明寶樹鳧鴈皆說妙法二唯識門前三教體皆自識所變故下云但當憶想令心眼見見此事者即見諸佛三歸性門識性體空唯真如故下云普聞眾聲純說甚深第一義諦四無礙門謂前理事交徹心境圓融故下云滿虗空中水鳥樹林及與諸佛所出音聲皆演妙法與十二部經合是則此經四門通取為教體矣七宗趣通局七宗趣通局者先通辨諸宗有六一隨相法執宗阿含俱舍諸經論也二唯識法相宗深密瑜伽諸經論也三真空無相宗般若中觀諸經論也四藏心緣起宗勝鬘起信諸經論也五真性寂滅宗楞伽佛性諸經論也六法界圓融宗華嚴十地諸經論也今此經宗當第四門經云是心作佛是心是佛故後唯明此經又有總別總以一心觀想念佛為宗願生西方見佛安樂為趣別者五對一教義對教修福作觀為宗達三種業十六門義為趣二事理對舉觀行事相為宗顯法界理性為趣三境智對所緣依正佛生境為宗能觀心眼分明智為趣四行位對三心六念行為宗四果十地位為趣五因果對不退道心直至等覺因為宗生方見佛圓成妙覺果為趣此之五對展轉相由生起者也八翻譯傳授二先總明部類差別八翻譯傳授者有二一部類部謂此觀無量壽佛經也類又二一大本一名無量清淨平等覺經後漢支婁迦讖譯二名無量壽經曹魏康僧鎧譯三名阿彌陀經吳支謙譯四名無量壽莊嚴經宋法賢譯二小本一名阿彌陀經姚秦鳩摩羅什譯二名稱讚淨土佛攝受經唐玄奘譯又亦部亦類者鼓音聲王經也非部非類者寶積第五無量壽如來會楞嚴二十四勢至念佛圓通章華嚴行願品末以十願王導歸樂土法華藥王品終讀誦斯經得見阿彌是也次別出譯人名代二譯人者劉宋西域三藏法師畺良耶舍譯也劉宋標代姓劉國號宋南北朝時也西域約處三藏顯德通經律論故佛法誨眾名為法師畺良耶舍此云時稱出名譯者翻梵成華也表行名義集云耶舍西域人性剛直寡嗜欲深善三藏多所諳知尤工禪思宋文帝元嘉元年鐘山翻譯僧含筆受天台疏云此本是宋元嘉時畺良於楊州譯也九總釋經題九總釋經題者題名佛說觀無量壽佛經佛者覺也覺了真妄性相故佛地云具二智斷二障覺二諦得自他二利如夢覺花開二喻故名為佛即本師釋迦牟尼佛也說者悅也八音遠被暢悅佛口及機心故既云佛說揀非菩薩天仙化人說也觀能觀智也梵語阿彌陀此云無量壽亦云無量光所緣境也無量者如來功德無盡量故壽光略舉恒沙性德中一應化隨緣現為壽命有始有終權智事法界觀報身以智慧為壽命有始無終實智理法界觀法身真如性為壽命無始無終中道智理事無礙法界觀法界身法界心為壽命有無俱泯法界無盡智事事無礙法界觀若以兩佛料揀一化身壽有量之有量如釋尊八十唱滅大論云此間閻浮惡故釋迦壽應短阿彌陀佛亦有不嚴淨國如釋迦佛身土此則緣促同促也二應身壽有量之無量如阿彌無量無邊阿僧祇劫大本云聲聞緣覺智力共筭計其壽命長遠之數不能窮盡知其限極法藏願云設我壽有限量下至百千億那由他劫者不取正覺涅槃云西方去此三十二恒河沙有無勝國其中莊嚴如安樂世界我於彼土出現於世大論云釋迦文佛更有清淨國土如阿彌陀佛國餘處眾生好故佛壽應長楞嚴三昧經云堅首菩薩問佛壽幾何佛令往東方過三萬二千佛土於莊嚴國問照明莊嚴自在王佛彼佛答云如釋迦壽我亦如是汝欲知者我壽七百阿僧祇劫堅首迴此白佛阿難云彼佛乃是釋迦異名雖有齊限人天莫數此則緣長同長也三報身壽無量之有量金光明經四佛為信相菩薩說云海滴山斤地塵空界可知其數無有能知如來壽者法華云我成佛已來甚大久遠無量無邊百千萬億那由他阿僧祇劫四法身壽無量之無量涅槃經云唯佛與佛其壽無量五法界身壽有量無量俱泯不立華嚴云法界非有量亦復非無量牟尼已超越有量及無量光明有二一者智光二者身光大本明阿彌陀具足五智一佛菩提智二大乘廣智三不可稱智四不思議智五無等無倫最上勝智由此故有五種慧光緣照五教眾生法界也身光又二一常光無放不放如圓光百億三千界等二放光即眉間頂上口齒臍足之類行者當以真實智觀智光方便智觀身光佛亦三一本覺佛涅槃云一切眾生即是佛如貧女舍寶力士額珠此則全覺全迷起信云依此平等法身說名本覺下云是心是佛二始覺佛依本覺內熏之力發心觀行修證此則覺而未盡者也故起信云不覺心源故非究竟覺下云是心作佛諸佛正徧知海從心想生於中又三一名字覺佛大悲經云一稱佛名以是善根入涅槃界法華云一稱南無佛皆已成佛道如須達聞名身毛皆豎下云但聞佛名除無量劫生死之罪稱佛名故除八十億劫生死之罪起信云凡夫人覺知前念起惡故能滅後念令其不起稱為名字覺也二相似覺佛楞嚴云若眾生心憶佛念佛現前當來必定見佛去佛不遠二憶念深如是乃至從生至生同於形影不相乖異下云汝等心想佛時是心即是三十二相八十隨形起信云二乘觀智初發意菩薩等覺於念異以捨麤分別執著相故名相似覺也三隨分覺佛楞嚴云心佛二同善得中道於大菩提已得通達覺通諸佛如來境界如是菩薩順行而至覺際入交下云見無量壽佛者即見十方無量諸佛現前授記起信云法身菩薩覺於念住以離分別麤念相故名隨分覺也三究竟覺佛歷超十二位方盡妙覺道如十五夜月圓滿具足此則無所不覺者也起信云菩薩地盡滿足方便一念相應覺心生起以覺心源故名究竟覺下云佛法界身入一切眾生心想中今於三中究竟佛也經中詳十六觀獨舉第九者舉主該伴舉正攝依舉果徹因故經者梵語修多羅此云契經契有二義一上契諸佛之理二下契眾生之機經復多義佛地開二一貫穿貫穿所說法也二攝持攝持所化生也此方四義一常三世不易也二法十方同軌也三徑古今共由也四典遠近尊守也若作對釋共有六義一能所對經字能詮也佛等所詮也亦名為教義對又名通別對經則總通諸部佛說等別局此本二自他對就所詮義中佛說自國本師也觀佛他土教主也亦名彼此對東西對三心境對亦名因果對就觀彼西土佛中觀字因也能緣心智也壽佛果也所緣理境也四名德對亦名同異對就果境中無量壽果德也獨自別有之號異乎餘佛者佛字果名也十號非唯自有同共餘佛者五一多對亦名揀顯對就異德中無量多也顯也顯功德多無量也壽字一也揀也單明壽命無量揀非光明音聲身相智慧方便教門無量也六智辨對亦名傳習對就說此東土佛中佛是能傳授人二智暢本懷故說是所受習法四辨說無礙故又以四法配之佛說教也觀行也無量壽理也佛果也則知此一題內人法雙標因果齊列下云為說經首題名除却千劫重惡若不義盡理圓豈得通為一部之總稱哉十別解文義二先略敘大意十別解文義者先略敘大意後詳解經文敘意中初明科判次釋疏式科判者一卷三分彌天高判第一序分先序此經通別之由致也第二正宗分由致既彰當根受法故次演一經所宗之正義也第三流通分正宗既陳務於利濟使現在當來弘傳不絕也又正宗中開為四分遠遵清凉近稟雲棲則信解行證是此經之宗歸為念佛三昧之終始也疏式者準賢家疏經式有四門初約教五教也二觀心三觀也三出果果證也四稱理諦理也始從如是我聞終至禮佛而退悉作四例而今偶一及者令人得意不俟繁文智者自能一一比知直指之名為此設耳上敘意竟次當詳解也後詳解經文三初序分二先證信序如是我聞至文殊師利法王子而為上首如是指法辭如所說者皆是真實故我聞明授本我昔阿難親從佛聞故一時猶言當時說聽時多舉一該別也梵語佛陀秦言覺知自覺覺他先知知後義即本土化主釋迦佛也在住也梵語羅閱祇伽羅此云王舍城駁足王與千王共立舍城都五山中為大國故亦云摩竭提此云不害無刑殺法故耆闍崛翻名鷲頭從形稱也亦云靈鷲佛昔為鷲鳥於此山中孝養父母故山中者山有五峯東名象頭南名馬頭西名羊頭北名師子頭中名鷲頭山有五精舍一者天主穴山精舍二七葉穴山精舍三蛇神穴山精舍四少獨力山精舍五耆闍崛山精舍故云闍崛山中此舉法主時處以證信也與者共義大者揀小道知用三大多勝故比丘者論釋有三一乞士乞食貲身乞法貲心也二怖魔出家離欲眾魔怖畏也三破惡見思惡業悉皆破滅也四人已上名和合眾事理無違如水乳耳千二百五十人者佛初成道度陳如五人次度三迦葉兄弟一優樓於火龍窟教徒五百二伽耶於象頭山教徒三百三那提於希連河教徒二百次度舍利目連各兼徒一百次度耶舍長者子等五十人經舉大數故減五人同時一處曰俱菩薩具云菩提薩埵此云覺有情廣覺一切有情故三萬二千數也文殊師利此云妙德亦云妙首又云妙吉祥入法正位名法王子智德獨尊故為上首此列大小聽眾以證信也此六成就諸經通有亦名通序次發起序四初闍王幽父爾時王舍大城有一太子至制諸羣臣一不得往爾時顯佛正在王城說法揀非遊化諸國時也阿闍世者此云未生怨胎時已於父王起怨害故或婆羅留支此云折指生時王令撲之不死折一指故調達具云提婆達多此云天熱生時人天熱惱故亦云天授從天乞授故自造三逆一推山壓佛石傷足指二蓮華色尼呵之拳打眼出三別搆五法以誘五百新學謂斷肉斷鹽不受五味不受割截衣不居聚落邊寺破和合眾教他二逆一教王殺父二教王害母故稱為惡友隨順教者調達教言我殺牟尼以作新佛汝殺頻娑以作新王闍王見其五通取天花食遂信其說行殺逆也頻婆娑羅此翻顏貌端正或云色像殊妙亦曰模實影堅阿闍未生有怨幽因也隨順惡教幽緣也重室制往幽法也收執閉置幽業也經初以幽父為發起者有二意一者頻婆昔於毗富羅山遊行獵鹿周遍無得唯見一仙生瞋惡心怒其逐去勑左右殺之其仙臨終誓言為子還以心口而害於汝若不報怨不能禁人無辜加害故楞嚴謂怨害輪迴食父母想如土梟破獍等類正此義也二者子若不逆必貪富貴終不能令聞法得果厭此娑婆苦故如此殺無明父利也大矣次夫人往濟國太夫人名韋提希至得聞法故顏色和悅先往濟飯食也頻娑稱妻曰夫人闍王稱母曰太夫人韋提希此云思惟聞佛正受善思惟故敬者頻娑常於佛所種諸善根故澡下外以淨妙漿密供表敬意也爾下次請求法食也初請應潄口求法須淨三業故遙禮佛有天眼通故目犍連此云采菽氏名拘律陀無節樹也禱此樹神生故以友輔仁名為親友揀上惡友也慈則與法樂悲則怨苦經云受此輪迴由隨殺盜婬故欲得菩提要除三惑故求授戒時下二赴感如鷹疾至神足通也八戒謂不殺不盜不婬不妄語不飲酒不著華香不觀伎樂不坐高床戒也及不過中食齋也名為八關戒齋富樓那翻滿慈或滿願諸弟子中說法第一故稱尊者知有妙辯令人法喜故遣為說法者善惡因果真妄斷證法也如下後快得充餐也飯食外貲色身法食內貲慧命故和悅次以往濟為發起者孝敬夫主是淨土因王命不濟淨業何從如提胃獻佛蜜佛與密成果記又維摩言法喜為妻者淨心以澡浴甘露法之食解脫味為漿既悅可其意乃發以道心莫非韋提希乎三闍王幽母時阿闍世問守門者至閉置深宮不令復出初探父事實也先闍王探問次門人實答不可禁者太后位尊非如臣可禁約羅漢神通非重門能制止也沙門華言勤息勤修眾善息滅諸惡故時阿下二怒母欲害也向彼異謀謂之賊竊與飲食名賊伴違背我心稱為惡劍欲害母不害父者瞋其通信母亡父不存故不殺守門人者先未勑禁婦女沙門故時有下三聽臣捨劍也初諫勸月光智謀如月故耆婆此云能活昔精醫道能活他命故是闍王庶兄奈女所生子也初詣得叉尸羅國師於阿提梨學醫經七年其師與一籠及掘草之具令遍覓藥草後於貨柴人所一大束中見有一木光明徹照名為藥王對諸病人照出身心一切症候悉令除愈毗陀論此云智論即四韋陀典也殺君父名惡王不忠孝名無道剎利秦言田主王種也旃陀羅此云屠者或云殺者魁膾也不忍聞者但令臣見莫使人聞穢名一傳輔相何顏晉有司言有子殺母者阮籍曰嘻殺父乃可至殺母乎文帝曰殺父天下之極惡而以為可乎籍曰禽獸知母而不知父殺父禽獸之類也殺母禽獸之不若故此貶曰不忍聞世傳名是旃陀也不住有二一罪及女人二刑加生母按劍却退者國有諍臣不得不用忠言以逆耳示威德以止怒也時下二畏從聽其言也厲則驚怖觀其威也猛則惶懼賢臣去而國亡名不為耆下三重誡慎誡也直諫以誡警也王下四止害懺是梵語具云懺摩此翻請忍或云請恕容恕我罪願忍勿瞋責也悔是華言百法中惡作也厭先過失故合之身則懺謝意則悔責向白法名懺捨黑法名悔懺是求來悔是改往懺則慚天而興善悔則愧人而罸惡求救者國唯以善人為寶豈可不哀留而受怨敵害也勑下後勑官幽閉也三以此為發起者亦二意一者普超經云阿闍世從文殊懺悔得柔順忍命終入賓吒羅地獄即入即出生上方佛土得無生忍彌勒出時復來此界名不動菩薩後當作佛號淨界如來其迹既爾本豈可量權現害生母者如我逆罪尚通懺悔況餘人輕重垢乎若不容懺佛道無從二者若不行逆母於子女起諸貪愛何能求見佛僧欣彼淨土樂乎楞伽云貪愛名為母斷即證實法維摩言行於非道通達佛道闍王之謂歟設非權現墜墮三途永無出期豈能得忍而成正覺哉四夫人求救時韋提希被幽閉已至普雨天華持用供養先因禁求佛也初語誠求心意悲苦曰愁憂形容枯槁曰憔悴安心名慰探身名問應攝受者而攝受之故恒遣教誡阿難此云慶喜又云無染佛成道日生白飯王子如來堂弟也多聞第一故稱尊者佛乃人天師不為一人故威重無見內居深宮外避嫌疑故求見二師目連是佛上首阿難是佛侍者請之則無患焉佛昔偏遣阿難來見頻娑王敬信三寶韋提夫人亦無故而今非昔比也作下二意哀求不能離生死怨故悲淚不能得佛法樂故向禮未舉下次隨請來赴也初遣徒來感應道交難思議故云未舉頃佛之三智無不知故云知心念道不虗行遇緣應故云勑空來佛下二佛親降山宮出沒者十佛中隨樂佛十身中意生身也問王與夫人皆請弟子何故王則遣徒夫人自去耶答有三意一頻娑願受戒聞法可遣人傳授韋提願求生淨土非佛難開示二於王若自往者阿闍謂朋父謀政怨嫌必重致滅法僧罪不可解於夫人自往者阿闍謂母無謀理嫌恨尚輕縱幽二親罪猶可懺三王乃丈夫可遣弟子教誡則無餘嫌憎夫人是女必須師弟同來自度諸疑謗時韋下後禮見主伴也初句能禮舉下所見有五一佛身釋迦翻能仁姓也從慈悲利物故不住涅槃牟尼翻寂默字也取智慧冥理故不住生死悲智並運立此嘉稱紫金色者清淨德性熏成非是欲愛生故二蓮座表念佛三昧絕百非具百法故三二聖先度目連故侍左後度阿難故侍右四諸天釋具云釋提桓因此云能天主能作三十三天主故梵是西音此云離欲或云淨行高淨大梵天王也護世四大天王也護持世界故諸天盡於三界天也五華供天華有二一曼陀羅此云適意白花也二曼殊沙此云柔軟赤花也或雨或供皆表因趣果義四以求救為發起者令知負債含怨雖夫父最親縈華已極一旦對至無可代受毗奈耶偈云假使百千劫所作業不亡因緣會遇時果報還自受唯除諸佛菩薩羅漢堪令出離楞伽云若有實造五逆罪者唯除覺了自心遇善知識方證解脫楞嚴云殺彼命者除奢摩他及佛出世不可停𥨊是以念佛求生為解怨釋結之要訣超生脫死之良方也統上四種發起事緣獨此經有餘所無者亦名別序二正宗分四初廣現十方佛土令生信樂分二先夫人三問詳三世事以請時韋提希見佛世尊至教我觀於清淨業處先追察過去業因也初歸誠三業自絕去意地貪欲以求佛心舉身捨身中婬殺以投佛身號泣斷口內妄語以依佛口若不盡命歸罪苦何由脫白下二求示二因何罪過去因惡子現在果問自身眷屬因也緣如前釋世下問如來眷屬因緣者昔於定光佛時耶若達欲嫁女有年老梵志須摩提求為女婿聰明而貌醜時釋迦為摩納童子顏貌姝好就珍寶仙人學習既成從遠方來遇見摩提論議摩提言屈耶若歡喜以女妻之摩提忿極誓願當來生生惱害摩提調達是女者瞿夷是如出生經共為眷屬者調達是佛從兄阿難親兄也釋氏譜及經律異相云淨飯王生二子長名悉達次名難陀白飯王二子長調達次阿難斛飯王二子長摩訶男拘利次阿那律甘露飯王二子長娑婆次䟦提一女名甘露味又涅槃報恩法句經云調達教闍王放五百醉象蹋殺如來佛入慈定舒手五指出五師子象見怖畏後調達復以毒藥著指爪中意因禮拜中傷佛足往而未到地自裂開生入地獄故此問言佛有何緣與達多共眷屬也應知闍王達多皆是逆行一令惡人不起逆罪二現逆行為攝惡類故大雲稱不思議法華與天王記若果實造輪轉惡道不休豈得世世同佛為伴哉唯願下次逆求未來生處也初正求請閻浮提此云勝金樹名濁謂五濁劫見煩惱眾生命也惡謂十惡身三殺盜婬口四妄言綺語兩舌惡口意三貪瞋痴也此濁下二出所以有四一地獄梵語捺洛迦此云苦具或翻惡處惡者生處徧滿苦器故二餓鬼梵語闍黎哆此云祖父或翻餓鬼長受飢餓故三畜生梵語底栗車此云畜生為人畜養故亦云旁行身行不正故四不善五逆十重等三途因也願我下三結欣厭邪教離耳清淨惡友離眼清淨今向下後啟請現在教觀也兩肘兩膝頭頂為五體要知過去因今生受者是恐償未盡故求懺要知後世果今生作者是觀法不諳故願教滅除眾生暗稱為佛日也清業揀惡聲則無憂淨處揀惡人則無惱次如來一光現十方土為答爾時世尊放眉間光至嚴顯可觀令韋提希見初總示能現也眉表中道光表智觀佛海三昧經云眉間毫相長一丈五尺如瑠璃筒從中發光金色者表金剛觀察徧照世界者表智緣法界此則一入一切也佛頂無見頂相表第一義諦金臺表實相體須彌唐言妙高山王也東黃金南瑠璃西白銀北頗梨隨方現色佛土皆現者表從體起用此則一切入一也或下二別舉所現也七寶合成者如南方寶生佛土等因示七菩提行揀不善聚也純蓮華者如西方蓮華世界等因開一乘佛教揀惡業聲也自在他化天如北方自在稱王世界等因入大涅槃果揀三途也玻瓈鏡者如東方瑠璃佛土等因悟如來藏心大圓鏡智揀惡人也十方者上則別列四方此則別盡餘方也有如下三結成教觀也莊飾曰嚴煥麗曰顯可觀答觀令見答教音聲名有相教光現名無相教今乃後一也又問三答一者現土自生欣樂欣樂自信教觀觀教自厭宿業故舉中以該前後耳二略示三種淨業令發知解分二先韋提的求往生樂土時韋提希白佛言世尊至教我思惟教我正受是下總揀去也清淨斷德成就光明智德莊嚴諸土共有者我下別擇取也極樂者梵語須摩提此云安樂安養清泰妙意依報土名阿彌陀此云無量壽亦云無量光正報佛號散心度量名思惟約慧言一心繫念名正受約定言次如來直指西方淨業二先且令頻娑成果爾時世尊即便微笑至自然增進成阿那含初微笑意有二一答夫人樂因故歡笑二成大王樂果故歡笑初見不笑者夫人欲自絕佛又何笑言有下二光照不待答而先光照王者令相見佛僧斷疑釋結一令相悟世法盡如幻夢二令相信善惡因果不忒三令相知各得修證利益四故也五色表破五陰苦而成五分法身樂超五濁而得五清從口表法王子皆從佛口法化生故光照王頂表一切智果出人天上最為尊勝爾下三成果心眼無障者即凡心而見佛心依肉眼而見佛眼也阿那含此云不還不來欲界受生死故三果也增進成者佛知見光增道損生故令轉凡為聖從初至三也此猶約近成言終歸大乘佛果如蒙光天子高超十地足可徵矣次正示韋提淨業二先舉無量佛土果以教正受爾時世尊告韋提希至諦觀彼國淨業成者初教知佛果樂國去十萬億土外而云不遠者一約機緣心行心則迷佛在心外則遠悟佛土唯心則近行則善力微無緣則遠善根熟有緣則近二約佛力加被初則佛頂臺中現出佛土令可觀見次則佛出聲光徹彼佛土欲見即見皆名為近除此盡遠也憶佛念佛現前當來必定見佛故教其解知下云是心是佛真諦智知法身佛也是心作佛俗諦智知報化佛也汝當下二教觀國土彼國淨業成者極樂國中無量莊嚴皆是無漏性德熏成清淨福業修成者也事一心名繫念念報化土理一心名諦觀觀法性土不可以少善根福德因緣得生彼國故教其念觀也此二詳下前十三觀次明三種淨業因以教思惟我今為汝廣說眾譬至三世諸佛淨業正因先舉益也眾譬指下後十四五六觀現在益亦令下當來益欲生下次明修中初標列惡業謂之禍善業謂之福一下二釋義一共凡夫業孝奉尊親也慈善愛物也供軄不怠名孝養服勞無違名奉事不殺略舉止善十善詳列行善釋之不殺盜婬妄言綺語兩舌惡口不貪瞋痴十止善也放生布施梵行誠實質直和諍柔軟不淨慈悲因緣十行善也二共小乘業三歸佛法僧也眾戒比丘等戒威儀初中後際行住坐臥內各具二百五十戒律共三千焉三共大乘業菩提心成等正覺心也信誦自覺心行勸進覺他心行也此則兼利他名世出世間上上福為上輩次則唯自利名出世福為中輩初則人天名世間福為下輩如此下三結成以此三福德向彼佛土修皆共成佛道故同名淨業佛告下後歎顯諸佛從心想生是業從性起修故是佛業正因心佛眾生三無差別修不明心便同有作故問知不三別明十六觀法令成因行分四初如來誡勸三先總誡諦聽佛告阿難及韋提希至善哉韋提希快問此事佛下誡今聽真實曰諦無邪曰善聽聞慧有心耳異須重誡思慧可知念修慧如來下明當說賊者劫法財戕慧命故善哉下讚前問利益現未宜稱善快次別勸阿難阿難汝當受持廣為多眾至應時即得無生法忍初勸持說領納法義曰受捧執文句曰持自利也宣說利他也如來下二出所以中先示觀法觀兼事理土通性相然上淨業是求生樂土因此樂土是淨業所感果法也執譬修持鏡譬觀心像譬土境喻也見彼下後明忍益得證也忍智也無生法理也慧心安此無生法性理故名得無生法忍華嚴云無生忍者不見有少法生不見有少法滅大彌陀經云有三法忍一音響忍二柔順忍三無生忍鈍根者成就二忍利根者得無生忍三十四四十八願云聞我名字不得菩薩無生法忍第一第二至第三者不取正覺信力入印度經云無生忍法則能清淨初歡喜地仁王云無生忍菩薩所謂遠不動觀慧遠即七遠行地不動即第八地觀慧即九善慧地也應時者圓頓入也見土是境妙心歡是因純即得是果熟楞嚴云身心快然如來淨妙皆現其中是人即獲無生法忍此之謂也後重示韋提佛告韋提希汝是凡夫至有異方便令汝得見凡夫肉眼不見障外想心不得正受菩薩天眼洞徹他土觀心入正定聚此揀凡聖心眼不同也諸佛如來指彌陀及餘佛三身上約依報果此約正報果也方便有二謂十六觀門及佛加持力觀則兼見法身如解脫長者隨意即見持則見報化身如城東老母背手皆見異者勝捷奇妙也起信云如來有勝方便謂以念佛因緣常見於佛二韋提啟請時韋提希白佛言世尊至阿彌陀佛極樂世界先為現在自他請佛力楞伽明二一入三昧二現身手為二持故即見諸佛般舟見佛論三力一佛威攝取力二念佛三昧力三本性功德力初仗佛次二約自今乏自力故請方便門也若下次為滅後眾生請無仁義禮智信名濁惡殺盜婬妄飲酒破五戒善名不善因也五陰熾盛生老病死愛別離怨憎會求不得名五苦果也眾生因果如濁水如來依正如月影感應因緣兩不相逗故須請心水若淨佛月自現矣三如來詳示二先總以標徵佛告韋提希汝及眾生至想於西方云何作想汝下標汝生人也應下法也觀住於理名專心想注於事名繫念一處文殊般若經謂一行三昧知法界一相也約能緣言西方境也前六觀依報功德中七觀正報相好後三觀三輩業行約所想言云何句徵次別為解釋十六初目想觀凡作想者一切眾生至是為日想名曰初觀初標境生盲揀非機小本彌陀經持名念佛一門已攝有目顯當機昔有目而今盲者亦為所被見日沒者既見日從西沒定知樂土居西方矣立日為境成事法界當起下次明觀想念西向定能緣心日欲沒相定所緣境未沒欲沒似有如無日相從西沒時日性亦從西沒真空絕相觀也心緣理想緣事堅住不移深勝初起日欲沒事即理狀如皷理即事理事無礙觀也已皆明了超前中住開目明日無心外之日日日遍心閉目了心無日外之心心心含日開閉普融日心無礙周遍含容觀也日作法界觀既爾餘十五門例知之是為下後結成二水想觀次作水想見水澄清至是為水想名第二觀初句標事境見下明觀門二先正作水觀明了無分能緣也水所緣澄則不渾清則不濁真空觀也既見水性起冰相想前句以理奪事次句事能隱理無礙觀也見映能作瑠璃所作不外瑠璃之水冰全體相在乎瑠璃不外冰水之瑠璃全體攝入乎冰水周遍觀也此想下後兼想地境水因地而權設是地前方便觀道地乃水之實法為水後正修行處故可合明意顯教觀前後無不圓融者也於中分三先明地內外映徹下有下次明地上下莊嚴又二初地下初句金剛為基七寶下七寶為幢幢楞有八擎八方地放光如日也瑠璃下二地上先金繩為間謂以黃金繩間廁界道傍也以七下次七寶為界界階道也瑠璃地上有八交道俱以七寶成也小本云四邊階道四寶合成於中連有四嚴一出妙華光又似下二光成樓臺於臺下三臺邊幢樂八種下四樂宣法音八風者東明庶東南清明南景西南凉西閶闔西北不周北廣莫東北條也又魏譯大本出八風相文云自然得風徐微一調和二不寒三不暑四溫凉五柔輭六不遲七不疾八吹諸網樹演布無量法音德香樂器謂金石絲竹匏土革木苦空舉一小乘法以攝大乘常樂我淨等也是為下結成想三地想觀此想成時一一觀之至若他觀者名為邪觀先標境躡前地想以為今門所依事體也一下二明觀二先行布觀想冰作瑠璃地地性本空真空觀也性空瑠璃地上想出無量嚴相理事觀也地之內外上下交相遍容周遍觀也前後次第作法界觀故云一一觀道深細修須純一故除衣食分散心時也漸入假想未得精妙名曰麤見若下次圓融觀地性嚴無量相亦空亦即亦遍同時具足不外一心故得此三昧知見不可說矣是為下三結成佛告下四顯益先勸傳持若觀下次出利益有二一滅罪益地是如實觀能除斷非日水假想不明滅又結地以例餘前後觀皆有此益也捨身下二生方益無疑者證信淨土唯心也作是下三揀邪正觀境合經見則斷惑證真便稱淨業名正觀相與經異見則生諸愛慢即為魔事名邪觀也四樹想觀佛告阿難及韋提希至是為樹想名第四觀佛下標境地句結前次句起後觀寶下起觀三初總觀體性行樹立體從心觀樹體樹樹皆心性真空觀也一下二別觀用相高葉華果相也童子幡葢用也於中六一高大其下二枝葉一下三光色瑠璃此云青色寶或云綠色寶梵語蘇伐羅此云金玻瓈此云水玉又云白珠紅色者梵語鉢摩羅伽此云赤光珠瑪瑙梵語摩羅伽隷具赤白二色硨磲此云大貝青白色寶綠珍珠梵語摩羅伽陀大論云此珠金翅鳥口邊出綠色能辟一切毒珊瑚梵語鉢攞娑福羅此云珊瑚樹生海底碧色應法師云初年青色次年黃色琥珀梵語阿隰摩揭婆其色紅瑩妙真下四羅網又三一明體相妙真珠梵語因陀尼羅大論云天赤珠一下二出重數一下三詳德用中開二一宮殿諸天下二童子又四一住處一下二身衣釋迦毗楞伽此云能勝摩尼此云離垢淨離垢穢故又云增長增長威德故楞嚴三昧云帝釋於善法堂中著釋迦毗楞伽摩尼瓔珞其下三光明不可下四寶色初句總貫次二句別顯謂眾寶物不可具說間錯狀不可具引色形相不可具言也此下五次第大本云行行相值莖莖相望枝枝相準葉葉相向華華相順實實相當皆明行伍相也於下六花果中又二先總一下次別分四一葉形量大色多可知畫線條也有眾下二花色閻浮檀此云勝金閻浮樹果水汁點物成金因流入河染石為金其色赤黃兼帶紫𦦨涌生下三果實帝釋天有一器名功德瓶隨所須物皆從瓶出花涌眾果亦爾有下四光明又二先化成幡葢是寶下次映現國事三千極樂本土也十方餘外鄰也以上六門相用事非理性外有一真體性理非事相外顯無礙觀成矣見此下三遍觀性相初句見樹性相結前也亦下起後也一一觀指七重行樹七七相重重重無盡矣樹莖等指六門相用彼此遍容一多即入也皆令明者周遍觀成也是為下結成五池水觀次當想水欲想水者至是為八功德水想名第五觀次句境也欲下觀也先總體想八池水性唯無相心成真空觀也一下次別相五初池水又二先能造體柔軟者稱心適意故如意珠者梵語摩尼自在曰王珠中最勝故圓覺云摩尼寶珠映於五色隨方各現分下次所流相支派也黃金下二渠流襍色者許慎云金有五色故一下三蓮花其下四泉聲先明灌注隨意其聲下次明音聲演法苦空小乘法也波羅密大乘始終法也相好一乘圓頓法也如下五鳥音哀雅讚者哀則讚佛大悲拔苦讚法解脫二死讚僧悲增化他雅則讚佛大慈與樂讚法證得二果讚僧智增自行通上五門具二觀法事相即理性理性即事相無礙觀也此一即彼多彼多即此一周遍觀也至此觀勝根利故得合轍不須次第偏歷是為下結也八功德者唐譯云一澄淨澄渟潔淨離污濁故二清冷清湛凉冷無煩熱故三甘美甘甜美妙具上味故四輕輭輕巧柔輭可上下故五潤澤津潤滑澤不枯澁故六安和安靜和緩絕迅汎故七除飢除飢渴病有勝力故八長養諸根長養調身心故六總相觀眾寶國土一一界上至若他觀者名為邪觀初明觀二先別觀寶樓閣界上謂界道內地面上也五百億重數也其下樓中諸天作樂也又下空裏樂器自鳴也此下樂內演出三寶聲也眾音指天樂空樂二種音樓閣天樂事法界為所緣境一一唯心性成理法界真空觀事相遍於理理性遍於事事理法界無礙觀理如事相無盡事如理性圓遍事事法界周遍觀皆能修觀此既總門故能所不分境觀圓融也此下後總結池地樹望後諸觀此猶約略見依土事未及詳悉正報名麤樹地池樓一齊見者境觀後後勝前前故較前第三見地前是麤中麤此則麤中細矣是為下二結成望前次第別相觀者今則四事同時具足名總若見下三顯益先滅罪命下次生方作下後揀取正則取邪則揀也七華座觀二初示現正報果發起信解佛告阿難及韋提希至觀無量壽佛及二菩薩先如來許示諦聽善念誡也為汝別說許也苦三苦八苦等果也惱十使煩惱等因也除苦轉生死得涅槃除惱轉惑業成菩提汝等下勸也上自行此利他說是下次三聖現前悲華經云過去劫中世界名刪提嵐劫名善持輪王名無諍念生有千子臣名寶海唯生一子號曰寶藏出家成道還號寶藏如來為王說法其王千子各各供養經三月已佛欲為記先入三昧光中現界或有濁惡或有淨妙王問其因佛言皆以願力度眾生故王言我願成佛不取不淨佛土願世界淨妙無四惡道亦無女人等一化生壽命無量宮殿莊嚴如第六天聞我名者必生我界唯除五逆誹謗聖人破壞正法等王發願已佛即告曰大王汝見西方過百千萬億佛土有尊音王如來世界嚴淨悉如汝願四佛滅後過二恒河沙阿僧祇劫中世界轉名安樂汝當作佛號無量壽如來次授輪王千子中第一不眴太子記曰汝觀六道生大悲心斷諸苦惱令安樂故今當字汝為觀世音無量壽佛般涅槃後二恒河沙阿僧祇劫於夜初分正法滅已於夜後分土其轉名一切珍寶之所成就種種莊嚴勝安樂界於一念頃便成正覺號徧出一切光明功德山王如來壽九十六億那由它百千萬億劫又告第二尼摩太子由汝願取大千界故今當字汝為大勢至功德山王佛滅度後汝當成道號善住珍寶山王如來如是次第授千子中有願取五濁成佛者即我釋迦文是以大悲故土名娑婆生佛忍於三毒諸煩惱惡故名忍土今佛將說三聖諸觀故現身相以證信也閻浮金不得比者閻浮檀金展轉比至迦葉身金猶如聚墨況佛光耶智論云閻浮提金比七金山須彌山金則不現須彌山金比忉利天瓔珞金乃至𦦨摩他化自在金則不現諸天身金比聲聞辟支菩薩身色則不現在佛光邊譬如焦炷比閻浮金時下後韋提禮請接足頂禮三聖足也白佛仰白釋迦尊也因佛者目覩觀則易自可緩未來者未見觀則難他須示故須代請然云觀佛菩薩揀前兼請觀極樂界次正說華座觀令成修證二初正明觀境佛告韋提希欲觀彼佛者至是為華座想名第七觀先標境初三句牒所請次二句示未問佛所坐者蓮臺為座故當想蓮花也令下次明觀二初觀花葉開五初顏色有八下二脉絡中又二先畫路脉有下次光明花葉下三形量直淺曰縱橫濶曰廣如是下四瓣數一下五珠鬚三先映影一下次放光其下三現葢釋下二觀蓮臺有九初臺即房也此下次網內含四相一房面金剛為孔二透出赤色肉尖甄叔迦此云赤色西域有叔迦樹其花色赤形大如手此寶似之要解云翻鸚鵡寶赤如其嘴故三內以摩尼為肉梵者白淨之謂四真珠為肉衣網校飾於外也於其下三幢前觀寶樹止高八千由旬今寶幢高百千萬億山王觀境展轉深勝可知幢上下四幔夜摩此云妙善時分時時唱快樂故幔中受樂如彼天也復下五珠幢幔周圍皆有如意珠瓔珞垂也一下六光一下七色一下八瑞謂變臺網雲種種異瑞相也於下九益見臺則悟如來妙覺果見網則解心地眾法門見雲則知菩薩萬行因故隨現佛事機無不被其澤也上想花葉蓮臺一一本無自性真空觀焉依此空無自性想成花臺相用理事觀焉花臺幢幔珠光一一皆遍法界周遍觀焉是為下後結成二重出所由佛告阿難如此妙華至若他觀者名為邪觀先華座因也華臺不可思議名為妙華亦事亦理亦因亦果亦依亦正亦多亦一故法藏願力者魏譯大本云過去錠光佛出至五十三佛名世自在王時有國王發心出家號曰法藏佛為廣說二百一十億諸佛剎土天人之善惡國土之粗妙法藏聞已即說四十八願今已成佛現在西方安樂世界眾寶蓮華周滿世界故依正二報皆佛行願功德成也若欲下二修觀法也佛坐蓮臺如諸天隨身宮殿故當前觀不得襍觀應一一者謂華葉中色脉量數珠光蓮臺內房網幢幔光色皆應一一作三法界觀也此為初機鈍根者說一下葉珠臺幢一一皆分明者作圓融法界觀揀上行布觀故如鏡中頓現面上眼耳鼻口眉鬚髮頂像也此為後心利根者說此想下三成利益先現在滅罪前地觀除八十億劫者初見彼國地故次總觀除無量億劫者通見彼國依報諸境故今觀除五萬億劫者始見彼佛一華座故較前則勝於次則劣然是佛智如量說耳非餘者所可道也必下次當來生方作是下四揀邪正也八聖像觀佛告阿難及韋提希至於現身中得念佛三昧初標境也見句結前次句起後所下次明觀二初徵也諸下二釋二先修觀想又四一佛身二初真佛又二先總明諸佛二初直標佛身遍入生心亦明佛即是心也法界身者即是無障礙法界身也以無障礙法界為體含四法界理法界法身事法界化身理事無礙法界報身事事無礙法界十身華嚴疏云此法界無盡身雲真應相融一多無礙即理即事即人即法即此即彼即因即果即有情即非情即三身即十身究竟覺也心本覺想始覺起信云所謂覺義者謂心體離念離念相者等虗空界無所不徧法界一相即是如來平等法身入者華嚴云普見一切眾生諸煩惱中有如來身智常無染汙德相備足無一眾生而不具有如來智慧是知心佛眾生三無差別矣是故下次轉釋心想佛即全彰亦明心即是佛也心想四句明心即是佛化身想佛從性起修也即是全修即性也眾生念佛佛在眾生心內矣是心四句明心即是佛報身修成曰作性有曰是生通二義新熏而後造就名出生本具於今得顯名現生心不想而佛不作故云是心作佛佛徧知海從生華嚴云諸佛如來不離此心成正覺故無有心外佛為佛證心故云是心是佛佛正知海從生圓覺云始知眾生本來成佛是故下次別明彌陀念觀能緣智繫念不斷名事一心諦觀不二名理一心多下所緣境多陀阿伽度秦翻為如來金剛云無所從來亦無所去故名如來法身也即真如門體大理法界阿羅訶秦翻應供應受一切魔梵人天諸供養故化身也即生滅門中用大事法界三藐三佛陀秦翻正徧知如理智名正知如量智名徧知報身也即生滅門中相大理事無礙法界開雖有三名義合實唯一法體即成法界身是大總相門一真法界心事事無礙法界故華嚴云十方諸如來同共一法身一心一智慧力無畏亦然斯之謂矣想彼下二應佛法界身無盡難思法性身離相莫測故當取應身先為觀想寶像如下所說莊嚴八萬相好法報化身並依之顯現故出觀入觀開目閉目無不知見故云心眼明也見極下二依土正覺業報佛眼尚能觀況前想池樹幔網法界本性佛心猶能見況前想樂土總境此又倍前無數故重表云見如此事彌覆滿空如指掌也見此下三二土先想二蓮華座座想已說故云如前想下次想二大士像像想已說故云如前此想下四三聖上皆偏觀此則普觀境觀增明主伴無盡故云一一徧滿從前想像至此四門事法界也一一皆有三法界觀像唯想生性本空寂真空也性雖空寂隨想像遍理事也想像如性遍容無礙周遍也清凉國師疏觀經至此開五種念佛門一緣想境界念佛門上從一心念觀彼佛至此文也二攝境唯心念佛門文云是心作佛諸佛徧知從想生也三心境無礙念佛門文云心想佛時是心即是三十二相八十隨形好也四心境俱泯念佛門文云是心是佛諸佛正知從心生也是心則佛相泯絕無寄是佛則心相當體全空二相不存二性顯矣五重重無盡念佛門文云諸佛如來是法界身入一切眾生心想中以此觀觀宗乎法界事事歸乎自心也此想下後聞法益初出利益今人偶一隨喜見聞尚於夢中見諸如來坐師子座圍繞說法況此想像觀耶楞嚴云憶佛念佛現前當來必定見佛華嚴云若有眾生專心憶念則佛現其前等因果感應法爾然也行者下二令揀別像禪觀中佛威光力佛本願力諒無魔事然有宿障深厚或不善用心容有魔起未可定也須令揀別自無患耳辨之有二一見佛聞法不與經教相合者是為魔事二不與本所修觀相符者亦屬魔事楞嚴云十方遍作閻浮檀色一切種類化為如來忽於空中聞說法聲或聞十方同敷密義斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪總見彼界佛菩薩像猶未精純深細名曰麤也是為下三結成作是下四顯益先滅罪例前第六觀於現下次成定念佛三昧亦名一行三昧文殊般若經云佛告文殊欲入一行三昧者應處空閒繫心一佛隨彼方所端身正向能於一佛念念相續即見過現未來諸佛若得是三昧者諸經法門皆悉了知如威光太子於波羅密善眼莊嚴王佛所得念佛三昧十千法門皆得通達是也
